name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.35.6'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      tag: ${{ steps.version.outputs.tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RAW_VERSION=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          if [ -z "$RAW_VERSION" ]; then
            echo "pubspec.yaml 中缺少 version 字段" >&2
            exit 1
          fi

          VERSION="${RAW_VERSION%%+*}"
          BUILD_NUMBER="${RAW_VERSION#*+}"
          if [ "$BUILD_NUMBER" = "$RAW_VERSION" ] || [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER=1
          fi

          PREV_RAW_VERSION=""
          if [ "${EVENT_NAME}" != "workflow_dispatch" ] && \
             [ -n "${EVENT_BEFORE:-}" ] && \
             [ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            if git show "${EVENT_BEFORE}:pubspec.yaml" >/tmp/previous_pubspec.yaml 2>/dev/null; then
              PREV_RAW_VERSION=$(awk '/^version:/ {print $2; exit}' /tmp/previous_pubspec.yaml)
            fi
          fi

          VERSION_CHANGED=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "$RAW_VERSION" != "$PREV_RAW_VERSION" ]; then
            VERSION_CHANGED=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android APK
    needs: prepare
    if: needs.prepare.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.prepare.outputs.version }} \
            --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build-android
    if: needs.prepare.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/

      - name: Generate APK SHA1
        id: apk_sha1
        run: |
          SHA1=$(sha1sum artifacts/app-release.apk | awk '{print $1}')
          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$SHA1" "app-release.apk" > artifacts/app-release.apk.sha1

      - name: Generate changelog
        id: changelog
        env:
          CURRENT_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- 无可展示的提交记录"
          fi

          echo "$COMMITS" > CHANGELOG.md
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Uni Yi ${{ needs.prepare.outputs.tag }}
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.commits }}

            ## 下载

            | 文件 | SHA1 | 说明 |
            | --- | --- | --- |
            | `app-release.apk` | `${{ steps.apk_sha1.outputs.sha1 }}` | Android 通用 APK |
            | `app-release.apk.sha1` | 同上 | APK 的 SHA1 校验文件 |

            **完整安装包和校验文件请查看下方 Assets。**
          files: |
            artifacts/app-release.apk
            artifacts/app-release.apk.sha1
          draft: false
          prerelease: false
