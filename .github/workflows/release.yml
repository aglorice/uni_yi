name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.35.6'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
      tag: ${{ steps.version.outputs.tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          RAW_VERSION=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          if [ -z "$RAW_VERSION" ]; then
            echo "pubspec.yaml 中缺少 version 字段" >&2
            exit 1
          fi

          VERSION="${RAW_VERSION%%+*}"
          BUILD_NUMBER="${RAW_VERSION#*+}"
          if [ "$BUILD_NUMBER" = "$RAW_VERSION" ] || [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER=1
          fi

          PREV_RAW_VERSION=""
          if [ "${EVENT_NAME}" != "workflow_dispatch" ] && \
             [ -n "${EVENT_BEFORE:-}" ] && \
             [ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]; then
            if git show "${EVENT_BEFORE}:pubspec.yaml" >/tmp/previous_pubspec.yaml 2>/dev/null; then
              PREV_RAW_VERSION=$(awk '/^version:/ {print $2; exit}' /tmp/previous_pubspec.yaml)
            fi
          fi

          VERSION_CHANGED=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "$RAW_VERSION" != "$PREV_RAW_VERSION" ]; then
            VERSION_CHANGED=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android APK
    needs: prepare
    if: needs.prepare.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          MISSING_SECRETS=""
          [ -n "$ANDROID_KEYSTORE_BASE64" ] || MISSING_SECRETS="$MISSING_SECRETS ANDROID_KEYSTORE_BASE64"
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || MISSING_SECRETS="$MISSING_SECRETS ANDROID_KEYSTORE_PASSWORD"
          [ -n "$ANDROID_KEY_ALIAS" ] || MISSING_SECRETS="$MISSING_SECRETS ANDROID_KEY_ALIAS"
          [ -n "$ANDROID_KEY_PASSWORD" ] || MISSING_SECRETS="$MISSING_SECRETS ANDROID_KEY_PASSWORD"

          if [ -n "$MISSING_SECRETS" ]; then
            echo "Missing GitHub Actions secrets:$MISSING_SECRETS" >&2
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.prepare.outputs.version }} \
            --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows Desktop
    needs: prepare
    if: needs.prepare.outputs.version_changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: >
          flutter build windows --release
          --build-name=${{ needs.prepare.outputs.version }}
          --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive `
            -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath "artifacts/uni_yi-windows-x64.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: artifacts/uni_yi-windows-x64.zip

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build-android
      - build-windows
    if: needs.prepare.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/

      - name: Generate APK SHA1
        id: apk_sha1
        run: |
          SHA1=$(sha1sum artifacts/app-release.apk | awk '{print $1}')
          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$SHA1" "app-release.apk" > artifacts/app-release.apk.sha1

      - name: Generate Windows SHA1
        id: windows_sha1
        run: |
          SHA1=$(sha1sum artifacts/uni_yi-windows-x64.zip | awk '{print $1}')
          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$SHA1" "uni_yi-windows-x64.zip" > artifacts/uni_yi-windows-x64.zip.sha1

      - name: Generate changelog
        id: changelog
        env:
          CURRENT_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- 无可展示的提交记录"
          fi

          echo "$COMMITS" > CHANGELOG.md
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: 拾邑 ${{ needs.prepare.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.commits }}

            ---

            ## 更新内容

            ${{ steps.changelog.outputs.commits }}

            ## Downloads

            | File | SHA1 | Description |
            | --- | --- | --- |
            | `app-release.apk` | `${{ steps.apk_sha1.outputs.sha1 }}` | Universal Android APK |
            | `uni_yi-windows-x64.zip` | `${{ steps.windows_sha1.outputs.sha1 }}` | Windows x64 desktop bundle |

            See **Assets** below for the full package and checksum file.
          files: |
            artifacts/app-release.apk
            artifacts/app-release.apk.sha1
            artifacts/uni_yi-windows-x64.zip
            artifacts/uni_yi-windows-x64.zip.sha1
          draft: false
          prerelease: false
